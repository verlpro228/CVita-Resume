<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <!-- 深紫色渐变 -->
    <linearGradient id="darkPurpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 深紫色渐变2 -->
    <linearGradient id="darkPurpleGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外层紫色边框包裹 - 圆角矩形 -->
  <rect x="8" y="8" width="204" height="204" rx="40" 
        stroke="url(#darkPurpleGradient)" 
        stroke-width="6" 
        fill="none"/>
  
  <!-- 内层虚线装饰 -->
  <rect x="20" y="20" width="180" height="180" rx="30" 
        stroke="url(#darkPurpleGradient)" 
        stroke-width="2" 
        fill="none"
        stroke-dasharray="6 4"
        opacity="0.4"/>
  
  <!-- 中心渐变背景 -->
  <circle cx="110" cy="110" r="70" 
          fill="url(#darkPurpleGradient)" 
          opacity="0.1"/>
  
  <!-- 主形状 - 上升的阶梯/简历 -->
  <g transform="translate(110, 110)">
    <!-- 第一层 - 底部 -->
    <rect x="-50" y="30" width="40" height="10" rx="5" 
          fill="url(#darkPurpleGradient)"/>
    
    <!-- 第二层 -->
    <rect x="-30" y="10" width="50" height="10" rx="5" 
          fill="url(#darkPurpleGradient)"/>
    
    <!-- 第三层 -->
    <rect x="-10" y="-10" width="60" height="10" rx="5" 
          fill="url(#darkPurpleGradient)"/>
    
    <!-- 第四层 - 顶部 -->
    <rect x="10" y="-30" width="50" height="10" rx="5" 
          fill="url(#darkPurpleGradient)"/>
  </g>
  
  <!-- 上升箭头/光芒 -->
  <path d="M110 55 L110 30 M98 43 L110 30 L122 43" 
        stroke="url(#darkPurpleGradient)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- 装饰点 - 象征机会/可能性 -->
  <circle cx="60" cy="60" r="5" fill="url(#darkPurpleGradient2)"/>
  <circle cx="160" cy="65" r="4" fill="url(#darkPurpleGradient2)"/>
  <circle cx="65" cy="160" r="4" fill="url(#darkPurpleGradient2)"/>
  <circle cx="165" cy="165" r="6" fill="url(#darkPurpleGradient2)"/>
  
  <!-- 四角装饰线 -->
  <line x1="30" y1="45" x2="45" y2="30" stroke="url(#darkPurpleGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="175" y1="45" x2="190" y2="30" stroke="url(#darkPurpleGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="175" x2="45" y2="190" stroke="url(#darkPurpleGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="175" y1="175" x2="190" y2="190" stroke="url(#darkPurpleGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>